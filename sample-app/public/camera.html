<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Camera Sender</title>
<style>
  body { background:#111; color:#eee; font-family:monospace; display:flex; flex-direction:column; align-items:center; padding:20px; gap:12px; }
  video { width:100%; max-width:480px; border-radius:8px; background:#000; }
  #status { font-size:.85rem; padding:4px 12px; border-radius:4px; background:#333; }
  #status.on { background:#16a34a; }
  button { padding:10px 24px; border:none; border-radius:6px; background:#2563eb; color:#fff; font-size:1rem; cursor:pointer; }
  button:disabled { background:#444; cursor:default; }
</style>
</head>
<body>
<h2>📷 Camera Sender</h2>
<span id="status">disconnected</span>
<video id="v" autoplay playsinline muted></video>
<button id="btn">Start Camera</button>
<canvas id="c" hidden></canvas>

<script>
const statusEl = document.getElementById('status');
const btn      = document.getElementById('btn');
const video    = document.getElementById('v');
const canvas   = document.getElementById('c');
const ctx      = canvas.getContext('2d');

let ws = null, timer = null;

btn.onclick = async () => {
  if (timer) { stop(); return; }

  const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' }, audio: false });
  video.srcObject = stream;

  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  ws = new WebSocket(`${proto}://${location.host}?role=sender`);
  ws.binaryType = 'arraybuffer';

  ws.onopen = () => {
    statusEl.textContent = 'streaming';
    statusEl.className = 'on';
    btn.textContent = 'Stop';
    startSending();
  };
  ws.onclose = ws.onerror = () => stop();
};

function startSending() {
  canvas.width  = video.videoWidth  || 640;
  canvas.height = video.videoHeight || 480;
  timer = setInterval(() => {
    if (ws?.readyState !== 1) return;
    canvas.width  = video.videoWidth;
    canvas.height = video.videoHeight;
    ctx.drawImage(video, 0, 0);
    canvas.toBlob(blob => blob?.arrayBuffer().then(buf => ws.send(buf)), 'image/jpeg', 0.7);
  }, 1000 / 15); // 15 fps
}

function stop() {
  clearInterval(timer); timer = null;
  ws?.close(); ws = null;
  video.srcObject?.getTracks().forEach(t => t.stop());
  video.srcObject = null;
  statusEl.textContent = 'disconnected';
  statusEl.className = '';
  btn.textContent = 'Start Camera';
}
</script>
</body>
</html>
